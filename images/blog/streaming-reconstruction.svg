<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" width="1100" height="460" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9ff"/>
      <stop offset="1" stop-color="#fdf3f9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1100" height="460" rx="18" fill="url(#bg)"/>

  <!-- title -->
  <text x="48" y="58" font-size="26" font-weight="800" fill="#1c2733">delta stream</text>
  <text x="48" y="86" font-size="14" fill="#6b7280">flat, fragmented events</text>

  <text x="720" y="58" font-size="26" font-weight="800" fill="url(#grad)">structured message</text>
  <text x="720" y="86" font-size="14" fill="#6b7280">saveable · replayable · executable</text>

  <!-- left: scattered delta chips -->
  <g font-size="14" font-weight="600" font-family="ui-monospace, Menlo, Consolas, monospace">
    <g transform="translate(48,120)"><rect width="196" height="34" rx="17" fill="#eef3fd" stroke="#c7d7f5"/><text x="16" y="22" fill="#2563eb">THINKING_DELTA</text></g>
    <g transform="translate(70,168)"><rect width="150" height="34" rx="17" fill="#eef3fd" stroke="#c7d7f5"/><text x="16" y="22" fill="#2563eb">SIGNATURE</text></g>
    <g transform="translate(40,216)"><rect width="150" height="34" rx="17" fill="#f3eefd" stroke="#d8c7f5"/><text x="16" y="22" fill="#7c3aed">TEXT_DELTA</text></g>
    <g transform="translate(78,264)"><rect width="196" height="34" rx="17" fill="#f3eefd" stroke="#d8c7f5"/><text x="16" y="22" fill="#7c3aed">TOOL_USE_START</text></g>
    <g transform="translate(44,312)"><rect width="210" height="34" rx="17" fill="#fdeef6" stroke="#f5c7de"/><text x="14" y="22" fill="#db2777">TOOL_INPUT_DELTA</text></g>
    <g transform="translate(92,360)"><rect width="150" height="34" rx="17" fill="#fdeef6" stroke="#f5c7de"/><text x="16" y="22" fill="#db2777">MESSAGE_STOP</text></g>
  </g>

  <!-- flow arrows converging into the state machine -->
  <g fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.55" marker-end="url(#arrow)">
    <path d="M300,137 C400,150 430,210 500,225"/>
    <path d="M300,281 C400,270 430,235 500,230"/>
    <path d="M300,329 C400,320 430,250 500,238"/>
  </g>

  <!-- center: little state machine node -->
  <g transform="translate(470,196)">
    <circle cx="30" cy="34" r="40" fill="#fff" stroke="url(#grad)" stroke-width="3"/>
    <text x="30" y="30" font-size="12" font-weight="700" fill="#1c2733" text-anchor="middle">state</text>
    <text x="30" y="46" font-size="12" font-weight="700" fill="#1c2733" text-anchor="middle">machine</text>
  </g>
  <path d="M580,230 C620,230 640,230 700,230" fill="none" stroke="url(#grad)" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- right: structured message card -->
  <g transform="translate(716,116)">
    <rect width="336" height="286" rx="14" fill="#ffffff" stroke="#e7ebf0"/>
    <rect x="0" y="0" width="336" height="40" rx="14" fill="#0f1729"/>
    <rect x="0" y="20" width="336" height="20" fill="#0f1729"/>
    <text x="18" y="26" font-size="13" font-weight="700" fill="#e6edf7" font-family="ui-monospace, monospace">role: assistant</text>

    <g font-family="ui-monospace, Menlo, monospace" font-size="12.5">
      <rect x="18" y="58" width="300" height="52" rx="8" fill="#eef3fd"/>
      <text x="32" y="80" fill="#2563eb" font-weight="700">thinking</text>
      <text x="32" y="99" fill="#5b6570">"read the file first"  + signature</text>

      <rect x="18" y="120" width="300" height="44" rx="8" fill="#f3eefd"/>
      <text x="32" y="142" fill="#7c3aed" font-weight="700">text</text>
      <text x="32" y="159" fill="#5b6570">"Let me look at the file."</text>

      <rect x="18" y="174" width="300" height="92" rx="8" fill="#fdeef6"/>
      <text x="32" y="196" fill="#db2777" font-weight="700">tool_use</text>
      <text x="32" y="215" fill="#5b6570">id: tool_1  ·  name: Read</text>
      <text x="32" y="234" fill="#5b6570">input: {</text>
      <text x="46" y="252" fill="#5b6570">"file_path": "main.py"</text>
    </g>
  </g>
</svg>
