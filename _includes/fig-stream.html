<figure class="post-figure">
<svg class="flowfig" viewBox="0 0 760 264" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <marker id="ahs" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#b0a897"/>
    </marker>
  </defs>

  <!-- column labels -->
  <text x="114" y="28" text-anchor="middle" font-size="11.5" fill="#8a8377">streamed deltas</text>
  <text x="384" y="28" text-anchor="middle" font-size="11.5" fill="#8a8377">state machine · pending buffers</text>
  <text x="647" y="28" text-anchor="middle" font-size="11.5" fill="#8a8377">assistant message</text>

  <!-- col 1: raw delta events -->
  <rect x="24" y="46" width="180" height="196" rx="6" fill="#fdfbf6" stroke="#e6dfd2"/>
  <text x="38" y="78"  font-size="12" fill="#2c2a26">THINKING_DELTA</text>
  <text x="38" y="110" font-size="12" fill="#2c2a26">TEXT_DELTA</text>
  <text x="38" y="142" font-size="12" fill="#2c2a26">TOOL_USE_START</text>
  <text x="38" y="174" font-size="12" fill="#2c2a26">TOOL_INPUT_DELTA</text>
  <text x="38" y="206" font-size="12" fill="#2c2a26">MESSAGE_STOP</text>

  <!-- col 2: pending buffers -->
  <rect x="294" y="50" width="180" height="48" rx="6" fill="#fdfbf6" stroke="#e6dfd2"/>
  <text x="384" y="71" text-anchor="middle" font-size="12" fill="#2c2a26">pending_thinking</text>
  <text x="384" y="88" text-anchor="middle" font-size="10.5" fill="#8a8377">+ signature</text>
  <rect x="294" y="110" width="180" height="38" rx="6" fill="#fdfbf6" stroke="#e6dfd2"/>
  <text x="384" y="134" text-anchor="middle" font-size="12" fill="#2c2a26">pending_text</text>
  <rect x="294" y="160" width="180" height="76" rx="6" fill="#fdfbf6" stroke="#e6dfd2"/>
  <text x="384" y="184" text-anchor="middle" font-size="12" fill="#2c2a26">current_tool</text>
  <text x="384" y="202" text-anchor="middle" font-size="10.5" fill="#8a8377">id · name</text>
  <text x="384" y="218" text-anchor="middle" font-size="10.5" fill="#8a8377">input_json_buffer</text>

  <!-- col 3: finalized blocks in order -->
  <rect x="560" y="50" width="176" height="50" rx="6" fill="#f0ebe0" stroke="#e6dfd2"/>
  <text x="648" y="72" text-anchor="middle" font-size="12" fill="#2c2a26">thinking</text>
  <text x="648" y="89" text-anchor="middle" font-size="10.5" fill="#8a8377">+ signature</text>
  <rect x="560" y="112" width="176" height="38" rx="6" fill="#f0ebe0" stroke="#e6dfd2"/>
  <text x="648" y="136" text-anchor="middle" font-size="12" fill="#2c2a26">text</text>
  <rect x="560" y="162" width="176" height="50" rx="6" fill="#f0ebe0" stroke="#e6dfd2"/>
  <text x="648" y="191" text-anchor="middle" font-size="12" fill="#2c2a26">tool_use</text>

  <!-- flow arrows -->
  <path d="M206,144 L290,144" stroke="#b0a897" fill="none" marker-end="url(#ahs)"/>
  <text x="248" y="132" text-anchor="middle" font-size="11" fill="#8a8377">accumulate</text>
  <path d="M476,144 L556,144" stroke="#b0a897" fill="none" marker-end="url(#ahs)"/>
  <text x="516" y="132" text-anchor="middle" font-size="11" fill="#1b62cf">flush on boundary</text>
</svg>
<figcaption>{{ include.caption }}</figcaption>
</figure>
