<script>
    $(document).ready(function () {
        {% if site.google_scholar_stats_use_cdn %}
        var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@'
        {% else %}
        var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/'
        {% endif %}
        $.getJSON(gsDataBaseUrl + "google-scholar-stats/gs_data.json", function (data) {
            // ---- total citations (legacy span + Citations stat tile) ----
            var totalCitation = data['citedby'];
            var legacy = document.getElementById('total_cit');
            if (legacy) legacy.innerHTML = totalCitation;

            var citTile = document.getElementById('stat-citations');
            if (citTile && typeof totalCitation === 'number') {
                citTile.setAttribute('data-target', totalCitation);
                citTile.setAttribute('data-suffix', '');
                if (window.animateCountEl) window.animateCountEl(citTile);
                else citTile.textContent = totalCitation.toLocaleString();
            }

            // ---- publications count (Publications stat tile) ----
            var pubTile = document.getElementById('stat-pubs');
            if (pubTile && data['publications']) {
                var n = Object.keys(data['publications']).length;
                pubTile.setAttribute('data-target', n);
                if (window.animateCountEl) window.animateCountEl(pubTile);
                else pubTile.textContent = n;
            }

            // ---- per-paper citation badges (if any use .show_paper_citations) ----
            var citationEles = document.getElementsByClassName('show_paper_citations');
            Array.prototype.forEach.call(citationEles, function (element) {
                var paperId = element.getAttribute('data');
                if (data['publications'][paperId]) {
                    element.innerHTML = '| Citations: ' + data['publications'][paperId]['num_citations'];
                }
            });
        });
    })
</script>
